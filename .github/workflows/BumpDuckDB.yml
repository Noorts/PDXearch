name: Bump DuckDB

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New DuckDB version tag (e.g. v1.5.2)"
        required: true
        type: string
      open_pr:
        description: "Open a PR after pushing the branch"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          # Use a token with push + PR scope; falls back to GITHUB_TOKEN.
          token: ${{ secrets.BUMP_DUCKDB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run bump script
        id: bump
        run: |
          python3 scripts/bump-duckdb.py "${{ inputs.new_version }}" --push

      - name: Open pull request
        if: ${{ inputs.open_pr }}
        env:
          GH_TOKEN: ${{ secrets.BUMP_DUCKDB_TOKEN || secrets.GITHUB_TOKEN }}
          OLD_VERSION: ${{ steps.bump.outputs.old_version }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
          TITLE: ${{ steps.bump.outputs.commit_message }}
        run: |
          # extension-ci-tools publishes versions as branches (no Releases
          # page), so link to the tree view rather than a 404 release URL.
          duckdb_release_url="https://github.com/duckdb/duckdb/releases/tag/${NEW_VERSION}"
          ci_tools_tree_url="https://github.com/duckdb/extension-ci-tools/tree/${NEW_VERSION}"
          compare_url="https://github.com/duckdb/duckdb/compare/${OLD_VERSION}...${NEW_VERSION}"

          {
            printf 'Automated bump from `%s` to `%s`.\n\n' "$OLD_VERSION" "$NEW_VERSION"
            printf '## Release notes\n\n'
            printf -- '- DuckDB %s: %s\n' "$NEW_VERSION" "$duckdb_release_url"
            printf -- '- extension-ci-tools %s: %s\n' "$NEW_VERSION" "$ci_tools_tree_url"
            printf -- '- Full changelog: %s\n\n' "$compare_url"
            printf 'Triggered via the Bump DuckDB workflow_dispatch.\n'
          } > pr_body.md

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "${TITLE}" \
            --body-file pr_body.md
